<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#012020"/>
      <stop offset="100%" stop-color="#024040"/>
    </linearGradient>
    <filter id="gblur">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="420" cy="360" r="300" fill="#00897B" opacity="0.12" filter="url(#gblur)"/>
  <circle cx="820" cy="420" r="220" fill="#FD7E41" opacity="0.09" filter="url(#gblur)"/>
  <!-- Grid -->
  <g stroke="white" stroke-width="1" opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/><line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>

  <!-- Large quote mark (decorative) -->
  <text x="80" y="320" font-family="Georgia,serif" font-size="280" fill="#00897B" opacity="0.12">"</text>

  <!-- User bubble (left - interviewer) -->
  <rect x="100" y="200" rx="20" ry="20" width="440" height="200" fill="#00897B" fill-opacity="0.18" stroke="#00897B" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Bubble tail -->
  <polygon points="120,400 148,400 120,440" fill="#00897B" fill-opacity="0.18"/>
  <!-- Bubble content lines -->
  <rect x="130" y="230" rx="4" ry="4" width="280" height="12" fill="white" opacity="0.18"/>
  <rect x="130" y="252" rx="4" ry="4" width="360" height="10" fill="white" opacity="0.13"/>
  <rect x="130" y="270" rx="4" ry="4" width="320" height="10" fill="white" opacity="0.12"/>
  <rect x="130" y="300" rx="4" ry="4" width="380" height="10" fill="white" opacity="0.1"/>
  <rect x="130" y="318" rx="4" ry="4" width="260" height="10" fill="white" opacity="0.1"/>
  <!-- Orange "insight" highlight line -->
  <rect x="130" y="348" rx="4" ry="4" width="200" height="14" fill="#FD7E41" opacity="0.5"/>

  <!-- Response bubble (right) -->
  <rect x="620" y="300" rx="20" ry="20" width="480" height="180" fill="#FD7E41" fill-opacity="0.12" stroke="#FD7E41" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Bubble tail -->
  <polygon points="1080,300 1108,300 1108,266" fill="#FD7E41" fill-opacity="0.12"/>
  <!-- Content lines -->
  <rect x="650" y="330" rx="4" ry="4" width="300" height="12" fill="white" opacity="0.15"/>
  <rect x="650" y="352" rx="4" ry="4" width="410" height="10" fill="white" opacity="0.1"/>
  <rect x="650" y="370" rx="4" ry="4" width="370" height="10" fill="white" opacity="0.09"/>
  <rect x="650" y="400" rx="4" ry="4" width="340" height="10" fill="white" opacity="0.09"/>
  <rect x="650" y="418" rx="4" ry="4" width="220" height="10" fill="white" opacity="0.08"/>

  <!-- User avatar (left, below bubble) -->
  <circle cx="140" cy="490" r="38" fill="#00897B" fill-opacity="0.3" stroke="#00897B" stroke-width="2"/>
  <!-- Person silhouette -->
  <circle cx="140" cy="478" r="12" fill="white" opacity="0.6"/>
  <ellipse cx="140" cy="508" rx="18" ry="12" fill="white" opacity="0.4"/>

  <!-- Interviewer avatar (right) -->
  <circle cx="1060" cy="240" r="38" fill="#FD7E41" fill-opacity="0.25" stroke="#FD7E41" stroke-width="2"/>
  <circle cx="1060" cy="228" r="12" fill="white" opacity="0.6"/>
  <ellipse cx="1060" cy="258" rx="18" ry="12" fill="white" opacity="0.4"/>

  <!-- Small insight dots -->
  <circle cx="620" cy="580" r="8" fill="#00897B" opacity="0.6"/>
  <circle cx="660" cy="560" r="5" fill="#00897B" opacity="0.4"/>
  <circle cx="690" cy="590" r="7" fill="#FD7E41" opacity="0.5"/>
  <circle cx="730" cy="570" r="4" fill="#FD7E41" opacity="0.35"/>
  <circle cx="755" cy="600" r="6" fill="#00897B" opacity="0.4"/>

  <!-- Connecting dots (insight markers) -->
  <line x1="140" y1="528" x2="140" y2="560" stroke="#00897B" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <circle cx="140" cy="570" r="5" fill="#FD7E41" opacity="0.7"/>
  <rect x="110" y="585" rx="4" ry="4" width="120" height="8" fill="white" opacity="0.12"/>
  <rect x="110" y="601" rx="4" ry="4" width="90" height="6" fill="white" opacity="0.08"/>

  <!-- Faded watermark -->
  <text x="600" y="760" font-family="system-ui,-apple-system,sans-serif" font-size="88" font-weight="700" fill="white" text-anchor="middle" opacity="0.03" letter-spacing="10">ENTREVISTAS</text>

  <!-- Category badge -->
  <rect x="62" y="712" rx="9" ry="9" width="160" height="44" fill="#FD7E41"/>
  <text x="142" y="739" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">UX Research</text>
</svg>
