<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100800"/>
      <stop offset="100%" stop-color="#2e1400"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FD7E41" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FD7E41" stop-opacity="0"/>
    </radialGradient>
    <filter id="gblur">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Central orange glow -->
  <circle cx="600" cy="390" r="300" fill="#FD7E41" opacity="0.14" filter="url(#gblur)"/>
  <!-- Grid -->
  <g stroke="white" stroke-width="1" opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/><line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>

  <!-- Radiating rings -->
  <circle cx="600" cy="370" r="280" fill="none" stroke="#FD7E41" stroke-width="1" stroke-dasharray="12 18" opacity="0.15"/>
  <circle cx="600" cy="370" r="220" fill="none" stroke="#FD7E41" stroke-width="1.5" stroke-dasharray="8 12" opacity="0.2"/>
  <circle cx="600" cy="370" r="160" fill="none" stroke="#FD7E41" stroke-width="2" stroke-dasharray="6 8" opacity="0.28"/>
  <circle cx="600" cy="370" r="100" fill="none" stroke="#FD7E41" stroke-width="2.5" stroke-dasharray="4 6" opacity="0.38"/>

  <!-- Main circle (outer ring of figure) -->
  <circle cx="600" cy="340" r="62" fill="#FD7E41" fill-opacity="0.22" stroke="#FD7E41" stroke-width="3"/>

  <!-- Head -->
  <circle cx="600" cy="316" r="20" fill="#FD7E41" opacity="0.9"/>

  <!-- Body (person shape) -->
  <!-- Torso line -->
  <line x1="600" y1="336" x2="600" y2="390" stroke="#FD7E41" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <!-- Arms extended -->
  <line x1="540" y1="358" x2="660" y2="358" stroke="#FD7E41" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <!-- Legs spread -->
  <line x1="600" y1="390" x2="558" y2="428" stroke="#FD7E41" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <line x1="600" y1="390" x2="642" y2="428" stroke="#FD7E41" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- Outer accessibility circle -->
  <circle cx="600" cy="370" r="68" fill="none" stroke="#FD7E41" stroke-width="6" opacity="0.75"/>

  <!-- Cardinal point markers on outer rings -->
  <circle cx="600" cy="90" r="6" fill="#FD7E41" opacity="0.5"/>
  <circle cx="600" cy="650" r="6" fill="#FD7E41" opacity="0.5"/>
  <circle cx="320" cy="370" r="6" fill="#FD7E41" opacity="0.5"/>
  <circle cx="880" cy="370" r="6" fill="#FD7E41" opacity="0.5"/>

  <!-- Diagonal markers -->
  <circle cx="402" cy="172" r="5" fill="#FD7E41" opacity="0.35"/>
  <circle cx="798" cy="172" r="5" fill="#FD7E41" opacity="0.35"/>
  <circle cx="402" cy="568" r="5" fill="#FD7E41" opacity="0.35"/>
  <circle cx="798" cy="568" r="5" fill="#FD7E41" opacity="0.35"/>

  <!-- Side text labels (decorative) -->
  <text x="110" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#FD7E41" opacity="0.4" letter-spacing="3">PERCEPTIBLE</text>
  <text x="110" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#FD7E41" opacity="0.4" letter-spacing="3">OPERABLE</text>
  <text x="110" y="430" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#FD7E41" opacity="0.4" letter-spacing="3">COMPRENSIBLE</text>
  <text x="110" y="520" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#FD7E41" opacity="0.4" letter-spacing="3">ROBUSTO</text>

  <!-- WCAG label on right -->
  <text x="870" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="white" opacity="0.12" letter-spacing="3">WCAG 2.1</text>
  <text x="870" y="270" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="white" opacity="0.12" letter-spacing="3">AA / AAA</text>

  <!-- Decorative plus marks -->
  <g fill="white" opacity="0.08" font-family="sans-serif" font-size="22" font-weight="300">
    <text x="90" y="130">+</text>
    <text x="1080" y="200">+</text>
    <text x="1080" y="600">+</text>
    <text x="90" y="660">+</text>
  </g>

  <!-- Faded watermark -->
  <text x="600" y="760" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="700" fill="white" text-anchor="middle" opacity="0.03" letter-spacing="10">INCLUSIVO</text>

  <!-- Category badge -->
  <rect x="62" y="712" rx="9" ry="9" width="168" height="44" fill="#FD7E41"/>
  <text x="146" y="739" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Accesibilidad</text>
</svg>
