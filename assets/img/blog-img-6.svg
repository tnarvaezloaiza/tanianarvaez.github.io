  <circle cx="804" cy="290" r="38" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1.5"/>
  <circle cx="804" cy="278" r="16" fill="white" opacity="0.4"/>
  <ellipse cx="804" cy="316" rx="24" ry="14" fill="white" opacity="0.25"/>

  <!-- Live notes panel -->
  <rect x="940" y="222" rx="8" ry="8" width="178" height="148" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <text x="955" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="white" opacity="0.25" letter-spacing="2">NOTAS</text>
  <rect x="955" y="252" rx="3" ry="3" width="140" height="8" fill="white" opacity="0.1"/>
  <rect x="955" y="268" rx="3" ry="3" width="120" height="8" fill="white" opacity="0.08"/>
  <rect x="955" y="284" rx="3" ry="3" width="150" height="8" fill="white" opacity="0.09"/>
  <rect x="955" y="310" rx="3" ry="3" width="130" height="8" fill="#8b5cf6" opacity="0.4"/>
  <rect x="955" y="326" rx="3" ry="3" width="100" height="8" fill="#8b5cf6" opacity="0.3"/>
  <rect x="955" y="342" rx="3" ry="3" width="145" height="8" fill="white" opacity="0.07"/>
  <!-- Highlight marker -->
  <rect x="952" y="307" rx="0" ry="0" width="4" height="28" fill="#FD7E41" opacity="0.7"/>

  <!-- Transcript lines -->
  <text x="680" y="394" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="white" opacity="0.2" letter-spacing="2">TRANSCRIPCIÓN</text>
  <rect x="680" y="402" rx="3" ry="3" width="420" height="8" fill="white" opacity="0.08"/>
  <rect x="680" y="418" rx="3" ry="3" width="380" height="8" fill="white" opacity="0.07"/>
  <rect x="680" y="434" rx="3" ry="3" width="400" height="8" fill="white" opacity="0.06"/>
  <rect x="680" y="450" rx="3" ry="3" width="200" height="8" fill="#8b5cf6" opacity="0.35"/>

  <!-- Insights chips -->
  <rect x="680" y="482" rx="6" ry="6" width="80" height="20" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="720" y="496" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" opacity="0.85">Insight #1</text>
  <rect x="770" y="482" rx="6" ry="6" width="80" height="20" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="810" y="496" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" opacity="0.85">Insight #2</text>
  <rect x="860" y="482" rx="6" ry="6" width="80" height="20" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="900" y="496" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" opacity="0.85">Insight #3</text>

  <!-- Pros chips Lookback -->
  <rect x="680" y="534" rx="12" ry="12" width="110" height="24" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="735" y="550" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" opacity="0.8">Cualitativo</text>
  <rect x="800" y="534" rx="12" ry="12" width="100" height="24" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="850" y="550" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" opacity="0.8">Moderado</text>
  <rect x="910" y="534" rx="12" ry="12" width="100" height="24" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="960" y="550" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" opacity="0.8">Video en vivo</text>

  <!-- ====== CENTER VS badge ====== -->
  <circle cx="600" cy="390" r="44" fill="#FD7E41" opacity="0.15"/>
  <circle cx="600" cy="390" r="36" fill="#111827" stroke="#FD7E41" stroke-width="2.5"/>
  <text x="600" y="400" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="#FD7E41" text-anchor="middle">VS</text>

  <!-- Faded watermarks -->
  <text x="300" y="760" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="700" fill="#0088ff" text-anchor="middle" opacity="0.03" letter-spacing="6">MAZE</text>
  <text x="900" y="760" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="700" fill="#8b5cf6" text-anchor="middle" opacity="0.03" letter-spacing="4">LOOKBACK</text>

  <!-- Category badge -->
  <rect x="62" y="712" rx="9" ry="9" width="164" height="44" fill="#FD7E41"/>
  <text x="144" y="739" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Herramientas</text>
</svg>
