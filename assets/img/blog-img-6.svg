<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e1a2c"/>
      <stop offset="100%" stop-color="#111f32"/>
    </linearGradient>
    <linearGradient id="bgRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#12161a"/>
      <stop offset="100%" stop-color="#0f1418"/>
    </linearGradient>
    <filter id="gblur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <!-- Split background -->
  <rect width="600" height="800" fill="url(#bgLeft)"/>
  <rect x="600" width="600" height="800" fill="url(#bgRight)"/>
  <!-- Divider line -->
  <line x1="600" y1="0" x2="600" y2="800" stroke="white" stroke-width="1.5" opacity="0.12"/>
  <!-- Glow hints -->
  <circle cx="300" cy="400" r="280" fill="#0066cc" opacity="0.07" filter="url(#gblur)"/>
  <circle cx="900" cy="400" r="280" fill="#6e3fc7" opacity="0.07" filter="url(#gblur)"/>
  <circle cx="600" cy="400" r="100" fill="#FD7E41" opacity="0.15" filter="url(#gblur)"/>

  <!-- Grid (both sides) -->
  <g stroke="white" stroke-width="1" opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/><line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>

  <!-- ====== LEFT SIDE: MAZE ====== -->
  <!-- Logo M -->
  <text x="130" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="700" fill="#0088ff" opacity="0.85" letter-spacing="-2">Maze</text>
  <!-- Subtitle -->
  <text x="130" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="white" opacity="0.35" letter-spacing="2">TEST CUANTITATIVO</text>

  <!-- Maze "dashboard" card -->
  <rect x="62" y="200" rx="12" ry="12" width="480" height="310" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Task rows (like Maze task list) -->
  <!-- Task 1 -->
  <rect x="86" y="226" rx="4" ry="4" width="16" height="16" fill="#0088ff" opacity="0.8"/>
  <rect x="112" y="228" rx="3" ry="3" width="180" height="10" fill="white" opacity="0.18"/>
  <!-- Progress bar -->
  <rect x="112" y="244" rx="3" ry="3" width="320" height="6" fill="white" opacity="0.06"/>
  <rect x="112" y="244" rx="3" ry="3" width="260" height="6" fill="#0088ff" opacity="0.6"/>
  <text x="444" y="253" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0088ff" opacity="0.8">81%</text>

  <!-- Task 2 -->
  <rect x="86" y="272" rx="4" ry="4" width="16" height="16" fill="#0088ff" opacity="0.8"/>
  <rect x="112" y="274" rx="3" ry="3" width="150" height="10" fill="white" opacity="0.15"/>
  <rect x="112" y="290" rx="3" ry="3" width="320" height="6" fill="white" opacity="0.06"/>
  <rect x="112" y="290" rx="3" ry="3" width="190" height="6" fill="#0088ff" opacity="0.5"/>
  <text x="444" y="299" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0088ff" opacity="0.8">59%</text>

  <!-- Task 3 -->
  <rect x="86" y="318" rx="4" ry="4" width="16" height="16" fill="#0088ff" opacity="0.8"/>
  <rect x="112" y="320" rx="3" ry="3" width="200" height="10" fill="white" opacity="0.15"/>
  <rect x="112" y="336" rx="3" ry="3" width="320" height="6" fill="white" opacity="0.06"/>
  <rect x="112" y="336" rx="3" ry="3" width="290" height="6" fill="#0088ff" opacity="0.6"/>
  <text x="444" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0088ff" opacity="0.8">91%</text>

  <!-- Heatmap section -->
  <text x="86" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="white" opacity="0.25" letter-spacing="2">HEATMAP</text>
  <rect x="86" y="390" rx="8" ry="8" width="200" height="100" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Heatmap color blobs -->
  <circle cx="150" cy="440" r="35" fill="#ff4400" opacity="0.25"/>
  <circle cx="210" cy="420" r="22" fill="#ff8800" opacity="0.2"/>
  <circle cx="130" cy="465" r="18" fill="#ffbb00" opacity="0.15"/>

  <!-- Metrics -->
  <rect x="302" y="386" rx="8" ry="8" width="110" height="48" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="357" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#0088ff" text-anchor="middle" opacity="0.9">72%</text>
  <text x="357" y="424" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.3">ÉXITO</text>
  <rect x="422" y="386" rx="8" ry="8" width="110" height="48" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="477" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="#0088ff" text-anchor="middle" opacity="0.9">34s</text>
  <text x="477" y="424" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.3">T. MEDIO</text>

  <!-- Pros chips -->
  <rect x="86" y="534" rx="12" ry="12" width="100" height="24" fill="#0088ff" fill-opacity="0.15" stroke="#0088ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="136" y="550" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0088ff" text-anchor="middle" opacity="0.8">Escalable</text>
  <rect x="196" y="534" rx="12" ry="12" width="120" height="24" fill="#0088ff" fill-opacity="0.15" stroke="#0088ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="256" y="550" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0088ff" text-anchor="middle" opacity="0.8">Sin moderador</text>
  <rect x="326" y="534" rx="12" ry="12" width="110" height="24" fill="#0088ff" fill-opacity="0.15" stroke="#0088ff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="381" y="550" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0088ff" text-anchor="middle" opacity="0.8">Figma nativo</text>

  <!-- ====== RIGHT SIDE: LOOKBACK ====== -->
  <text x="648" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="700" fill="#8b5cf6" opacity="0.85" letter-spacing="-2">Lookback</text>
  <text x="648" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="white" opacity="0.35" letter-spacing="2">TEST CUALITATIVO</text>

