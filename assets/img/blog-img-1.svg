<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#302b63"/>
    </linearGradient>
    <filter id="gblur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Glow blobs -->
  <circle cx="580" cy="380" r="280" fill="#7c5cfc" opacity="0.13" filter="url(#gblur)"/>
  <circle cx="780" cy="500" r="200" fill="#FD7E41" opacity="0.09" filter="url(#gblur)"/>
  <!-- Subtle grid -->
  <g stroke="white" stroke-width="1" opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/><line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>
  <!-- Neural connections (purple) -->
  <g stroke="#7c5cfc" stroke-width="1.5" opacity="0.3">
    <line x1="600" y1="390" x2="370" y2="240"/>
    <line x1="600" y1="390" x2="845" y2="205"/>
    <line x1="600" y1="390" x2="258" y2="465"/>
    <line x1="600" y1="390" x2="815" y2="535"/>
    <line x1="600" y1="390" x2="445" y2="590"/>
    <line x1="600" y1="390" x2="735" y2="640"/>
    <line x1="370" y1="240" x2="178" y2="172"/>
    <line x1="370" y1="240" x2="258" y2="465"/>
    <line x1="845" y1="205" x2="1050" y2="140"/>
    <line x1="845" y1="205" x2="815" y2="535"/>
    <line x1="258" y1="465" x2="98" y2="560"/>
    <line x1="815" y1="535" x2="965" y2="658"/>
    <line x1="445" y1="590" x2="292" y2="696"/>
    <line x1="735" y1="640" x2="895" y2="726"/>
  </g>
  <!-- Orange accent connections -->
  <g stroke="#FD7E41" stroke-width="2.5" opacity="0.65">
    <line x1="600" y1="390" x2="370" y2="240"/>
    <line x1="600" y1="390" x2="815" y2="535"/>
  </g>
  <!-- Orbit rings -->
  <circle cx="600" cy="390" r="118" fill="none" stroke="#7c5cfc" stroke-width="1" stroke-dasharray="6 10" opacity="0.28"/>
  <circle cx="600" cy="390" r="198" fill="none" stroke="#7c5cfc" stroke-width="0.7" stroke-dasharray="3 14" opacity="0.14"/>
  <!-- Center node -->
  <circle cx="600" cy="390" r="48" fill="#7c5cfc" fill-opacity="0.18" stroke="#7c5cfc" stroke-width="2"/>
  <circle cx="600" cy="390" r="13" fill="#FD7E41"/>
  <circle cx="600" cy="390" r="6" fill="white"/>
  <!-- Primary nodes -->
  <circle cx="370" cy="240" r="22" fill="#7c5cfc" fill-opacity="0.22" stroke="#FD7E41" stroke-width="2.5"/>
  <circle cx="370" cy="240" r="8" fill="#FD7E41"/>
  <circle cx="845" cy="205" r="18" fill="#7c5cfc" fill-opacity="0.18" stroke="#7c5cfc" stroke-width="2"/>
  <circle cx="845" cy="205" r="6" fill="#7c5cfc"/>
  <circle cx="258" cy="465" r="15" fill="#7c5cfc" fill-opacity="0.14" stroke="#7c5cfc" stroke-width="1.5"/>
  <circle cx="258" cy="465" r="5" fill="#7c5cfc"/>
  <circle cx="815" cy="535" r="20" fill="#7c5cfc" fill-opacity="0.2" stroke="#FD7E41" stroke-width="2.5"/>
  <circle cx="815" cy="535" r="7" fill="#FD7E41"/>
  <circle cx="445" cy="590" r="13" fill="#7c5cfc" fill-opacity="0.12" stroke="#7c5cfc" stroke-width="1.5"/>
  <circle cx="445" cy="590" r="4" fill="#7c5cfc"/>
  <circle cx="735" cy="640" r="12" fill="#7c5cfc" fill-opacity="0.1" stroke="#7c5cfc" stroke-width="1.5"/>
  <circle cx="735" cy="640" r="4" fill="#7c5cfc"/>
  <!-- Far small nodes -->
  <circle cx="178" cy="172" r="7" fill="#7c5cfc" opacity="0.55"/>
  <circle cx="1050" cy="140" r="7" fill="#7c5cfc" opacity="0.45"/>
  <circle cx="98" cy="560" r="5" fill="#7c5cfc" opacity="0.38"/>
  <circle cx="965" cy="658" r="7" fill="#7c5cfc" opacity="0.45"/>
  <circle cx="292" cy="696" r="5" fill="#7c5cfc" opacity="0.38"/>
  <circle cx="895" cy="726" r="6" fill="#7c5cfc" opacity="0.38"/>
  <circle cx="1120" cy="350" r="4" fill="#7c5cfc" opacity="0.28"/>
  <circle cx="138" cy="298" r="4" fill="#7c5cfc" opacity="0.28"/>
  <circle cx="1080" cy="580" r="5" fill="#7c5cfc" opacity="0.3"/>
  <circle cx="60" cy="190" r="4" fill="#7c5cfc" opacity="0.22"/>
  <!-- Faded watermark text -->
  <text x="600" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="98" font-weight="700" fill="white" text-anchor="middle" opacity="0.035" letter-spacing="14">PSICOLOGÍA</text>
  <!-- Category badge -->
  <rect x="62" y="712" rx="9" ry="9" width="162" height="44" fill="#FD7E41"/>
  <text x="143" y="739" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">UX Research</text>
  <!-- Decorative crosses -->
  <g fill="white" opacity="0.1" font-family="sans-serif" font-size="24" font-weight="300">
    <text x="88" y="385">+</text>
    <text x="1065" y="238">+</text>
    <text x="986" y="98">+</text>
    <text x="162" y="666">+</text>
  </g>
</svg>
