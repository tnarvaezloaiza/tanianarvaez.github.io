<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060d1f"/>
      <stop offset="100%" stop-color="#0d1f42"/>
    </linearGradient>
    <filter id="gblur">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Glow highlights -->
  <circle cx="300" cy="350" r="200" fill="#1e40af" opacity="0.12" filter="url(#gblur)"/>
  <circle cx="600" cy="350" r="200" fill="#FD7E41" opacity="0.1" filter="url(#gblur)"/>
  <circle cx="900" cy="350" r="200" fill="#1e40af" opacity="0.12" filter="url(#gblur)"/>
  <!-- Grid -->
  <g stroke="white" stroke-width="1" opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/><line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>

  <!-- Step positions: x = 130, 330, 530, 730, 930 — centered at y=330 -->
  <!-- Connecting line (track) -->
  <line x1="130" y1="330" x2="1070" y2="330" stroke="white" stroke-width="2" stroke-dasharray="8 6" opacity="0.15"/>

  <!-- Arrow connectors -->
  <g stroke="#1e40af" stroke-width="2.5" opacity="0.5">
    <!-- Step 1→2 -->
    <line x1="182" y1="330" x2="278" y2="330"/>
    <polygon points="278,322 294,330 278,338" fill="#1e40af" opacity="0.5"/>
    <!-- Step 2→3 -->
    <line x1="382" y1="330" x2="478" y2="330"/>
    <polygon points="478,322 494,330 478,338" fill="#1e40af" opacity="0.5"/>
    <!-- Step 3→4 (orange, active) -->
    <line x1="582" y1="330" x2="678" y2="330" stroke="#FD7E41"/>
    <polygon points="678,322 694,330 678,338" fill="#FD7E41"/>
    <!-- Step 4→5 -->
    <line x1="782" y1="330" x2="878" y2="330"/>
    <polygon points="878,322 894,330 878,338" fill="#1e40af" opacity="0.5"/>
  </g>

  <!-- Step 1: Research -->
  <circle cx="130" cy="330" r="50" fill="#1e40af" fill-opacity="0.2" stroke="#1e40af" stroke-width="2" stroke-opacity="0.6"/>
  <text x="130" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">01</text>
  <!-- Icon: magnifying glass simplified -->
  <circle cx="130" cy="272" r="14" fill="none" stroke="#4a90d9" stroke-width="2" opacity="0.7"/>
  <line x1="140" y1="282" x2="148" y2="290" stroke="#4a90d9" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Label -->
  <text x="130" y="404" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle" opacity="0.7">RESEARCH</text>

  <!-- Step 2: Síntesis -->
  <circle cx="330" cy="330" r="50" fill="#1e40af" fill-opacity="0.2" stroke="#1e40af" stroke-width="2" stroke-opacity="0.6"/>
  <text x="330" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">02</text>
  <!-- Icon: simplified chart/affinity map -->
  <rect x="315" y="264" rx="2" ry="2" width="8" height="14" fill="#4a90d9" opacity="0.7"/>
  <rect x="327" y="258" rx="2" ry="2" width="8" height="20" fill="#4a90d9" opacity="0.7"/>
  <rect x="339" y="268" rx="2" ry="2" width="8" height="10" fill="#4a90d9" opacity="0.7"/>
  <text x="330" y="404" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle" opacity="0.7">SÍNTESIS</text>

  <!-- Step 3: Ideación — HIGHLIGHTED (orange) -->
  <circle cx="530" cy="330" r="58" fill="#FD7E41" fill-opacity="0.2" stroke="#FD7E41" stroke-width="3"/>
  <text x="530" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="700" fill="#FD7E41" text-anchor="middle">03</text>
  <!-- Icon: lightbulb -->
  <circle cx="530" cy="270" r="14" fill="none" stroke="#FD7E41" stroke-width="2" opacity="0.8"/>
  <line x1="524" y1="284" x2="524" y2="292" stroke="#FD7E41" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="530" y1="284" x2="530" y2="294" stroke="#FD7E41" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="536" y1="284" x2="536" y2="292" stroke="#FD7E41" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- Corner handles for highlighted step -->
  <rect x="466" y="266" rx="2" ry="2" width="8" height="8" fill="#FD7E41" opacity="0.7"/>
  <rect x="590" y="266" rx="2" ry="2" width="8" height="8" fill="#FD7E41" opacity="0.7"/>
  <rect x="466" y="388" rx="2" ry="2" width="8" height="8" fill="#FD7E41" opacity="0.7"/>
  <rect x="590" y="388" rx="2" ry="2" width="8" height="8" fill="#FD7E41" opacity="0.7"/>
  <text x="530" y="410" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700" fill="#FD7E41" text-anchor="middle">IDEACIÓN</text>

  <!-- Step 4: Wireframe -->
  <circle cx="730" cy="330" r="50" fill="#1e40af" fill-opacity="0.2" stroke="#1e40af" stroke-width="2" stroke-opacity="0.6"/>
  <text x="730" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">04</text>
  <!-- Icon: simplified wireframe box -->
  <rect x="716" y="260" rx="2" ry="2" width="28" height="20" fill="none" stroke="#4a90d9" stroke-width="2" opacity="0.7"/>
  <line x1="716" y1="268" x2="744" y2="268" stroke="#4a90d9" stroke-width="1.5" opacity="0.5"/>
  <rect x="716" y="282" rx="2" ry="2" width="12" height="8" fill="#4a90d9" opacity="0.3"/>
  <text x="730" y="404" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle" opacity="0.7">WIREFRAME</text>

  <!-- Step 5: Prototipo -->
  <circle cx="930" cy="330" r="50" fill="#1e40af" fill-opacity="0.2" stroke="#1e40af" stroke-width="2" stroke-opacity="0.6"/>
  <text x="930" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">05</text>
  <!-- Icon: simplified phone/prototype -->
  <rect x="918" y="256" rx="4" ry="4" width="24" height="40" fill="none" stroke="#4a90d9" stroke-width="2" opacity="0.7"/>
  <circle cx="930" cy="288" r="2" fill="#4a90d9" opacity="0.7"/>
  <text x="930" y="404" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle" opacity="0.7">PROTOTIPO</text>

  <!-- Iteration arrow (bottom curve from 5 back toward center) -->
  <path d="M 980 430 Q 980 520 600 520 Q 220 520 180 430" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.28"/>
  <polygon points="180,422 172,438 188,438" fill="#1e40af" opacity="0.28"/>
  <text x="600" y="544" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.2" letter-spacing="3">ITERACIÓN</text>

  <!-- Faded watermark -->
  <text x="600" y="760" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" opacity="0.03" letter-spacing="8">PROCESO</text>

  <!-- Category badge -->
  <rect x="62" y="712" rx="9" ry="9" width="126" height="44" fill="#FD7E41"/>
  <text x="125" y="739" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Proceso</text>
</svg>
